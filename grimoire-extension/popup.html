<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 240px;
            margin: 0;
            padding: 16px;
            background-color: #080d10;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 14px;
            margin-bottom: 14px;
        }

        .logo-frame {
            height: 36px;
            width: 36px;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }

        .title-block {
            display: flex;
            flex-direction: column;
        }

        .title {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 11px;
            color: #64748b;
            margin-top: 1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #10b981;
            font-size: 11px;
            font-weight: 700;
            padding: 7px 12px;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }

        .btn-dashboard {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background-color: #10b981;
            color: #090d10;
            border: none;
            border-radius: 6px;
            padding: 9px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 14px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.25);
            transition: all 0.2s ease;
        }

        .btn-dashboard:hover {
            transform: scale(1.01);
            opacity: 0.95;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="assets/icon-48.png" alt="Grimoire Logo" class="logo-frame" />
        <div class="title-block">
            <div class="title">Grimoire</div>
            <div class="tagline">Knowledge Clipper</div>
        </div>
    </div>

    <div class="status-badge">
        <span
            style="height: 6px; width: 6px; background-color: #10b981; border-radius: 50%; display: inline-block;"></span>
        Clipper Status: Active
    </div>

    <button id="open-dashboard" class="btn-dashboard">Open Your Grimoire</button>

    <script src="popup.js"></script>
</body>

</html>
